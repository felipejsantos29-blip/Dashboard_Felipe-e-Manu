<div class="stats-grid">
    <div class="stat-card green">
        <div class="stat-label">Saldo em Conta (Banco)</div>
        <div class="stat-val" id="val-banco">R$ 0,00</div>
        <div style="font-size: 10px; color: var(--gray);">Dinheiro real disponível</div>
    </div>

    <div class="stat-card red">
        <div class="stat-label">Dívida Cartão (A pagar)</div>
        <div class="stat-val" id="val-fatura">R$ 0,00</div>
        <div style="font-size: 10px; color: var(--gray);">Soma de todas as compras no cartão</div>
    </div>

    <div class="stat-card blue">
        <div class="stat-label">Receitas (Mês)</div>
        <div class="stat-val" id="val-rec">R$ 0,00</div>
    </div>

    <div class="stat-card red">
        <div class="stat-label">Despesas Reais (Mês)</div>
        <div class="stat-val" id="val-des">R$ 0,00</div>
        <div style="font-size: 10px; color: var(--gray);">Consumo total (Cartão + Pix)</div>
    </div>
</div>

<script>
    // ... (mantenha a função carregarDados e parseCSVLine)

    function atualizarDashboard() {
        const mSel = document.getElementById('f-mes').value;
        const tSel = document.getElementById('f-tipo').value;

        // 1. FILTROS
        const filtrados = dadosGlobais.filter(d => {
            const bateMes = mSel === 'todos' || d.data.startsWith(mSel);
            const bateTipo = tSel === 'todos' || d.tipoOrigem === tSel;
            return bateMes && bateTipo;
        });

        // 2. LÓGICA DE SALDO BANCÁRIO (DINHEIRO QUE SAI DA CONTA)
        // O saldo do banco diminui com: PIX, Débito e o PAGAMENTO DA FATURA.
        const saldoBanco = dadosGlobais.filter(d => d.tipoOrigem === 'extrato')
                                       .reduce((s, d) => s + d.valor, 0);

        // 3. LÓGICA DE CARTÃO (DÍVIDA)
        // A dívida aumenta com compras no cartão e diminui quando a fatura é paga.
        const dividaCartao = dadosGlobais.reduce((s, d) => {
            if (d.tipoOrigem === 'cartao') return s + d.valor; // Compras negativas
            if (d.desc.toUpperCase().includes("FATURA PAGA") || d.desc.toUpperCase().includes("LATAM PASS")) {
                return s + Math.abs(d.valor); // Pagamento "anula" a dívida
            }
            return s;
        }, 0);

        // 4. DESPESAS REAIS (CONSUMO)
        // Aqui somamos o que você consumiu, mas ignoramos o "Pagamento de Fatura" para não contar duas vezes.
        const receitasMes = filtrados.filter(d => d.valor > 0).reduce((s, d) => s + d.valor, 0);
        const despesasMes = filtrados.filter(d => {
            const ehNegativo = d.valor < 0;
            const ehPagamentoFatura = d.desc.toUpperCase().includes("FATURA PAGA") || d.cat.toUpperCase().includes("PAGAMENTO");
            return ehNegativo && !ehPagamentoFatura;
        }).reduce((s, d) => s + Math.abs(d.valor), 0);

        // Interface
        document.getElementById('val-banco').innerText = formatMoeda(saldoBanco);
        document.getElementById('val-fatura').innerText = formatMoeda(dividaCartao);
        document.getElementById('val-rec').innerText = formatMoeda(receitasMes);
        document.getElementById('val-des').innerText = formatMoeda(despesasMes);
        
        // Cores de alerta para o cartão
        document.getElementById('val-fatura').style.color = dividaCartao < 0 ? 'var(--red)' : 'var(--green)';

        // Atualizar Ranking e Gráficos
        renderRanking(filtrados);
        renderCharts(filtrados, mSel);
    }

    // ... (mantenha as funções de gráficos e ranking)
</script>
