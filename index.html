<script>
    const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQsLc59dPTESRnZSBy17eECrYtZcerEjsL75UTjBIU5ELxtrdzM5bjtdRSqDjPreA/pub?output=csv';
    let dadosGlobais = [];
    let charts = {};

    async function carregarDados() {
        try {
            const resp = await fetch(URL_CSV);
            const csv = await resp.text();
            const linhas = csv.split('\n').filter(l => l.trim().length > 0);
            
            dadosGlobais = [];
            const meses = new Set();

            for (let i = 1; i < linhas.length; i++) {
                const col = parseCSVLine(linhas[i]);
                if (col.length < 6) continue;

                const data = col[1]?.trim();
                const tipoOrigem = col[2]?.trim().toLowerCase() || ""; 
                const desc = col[3]?.trim() || "";
                const cat = col[4]?.trim() || "Outros";
                
                let vLimpo = col[5].replace(/"/g, '').replace(/\s/g, '').replace(',', '.');
                const valor = parseFloat(vLimpo) || 0;

                // Ignora linhas de conferência de saldo
                if (data && data.includes('-') && !desc.toUpperCase().includes("SALDO DO DIA")) {
                    dadosGlobais.push({ data, tipoOrigem, desc, cat, valor });
                    meses.add(data.substring(0, 7));
                }
            }

            const fMes = document.getElementById('f-mes');
            if(fMes.options.length <= 1) {
                Array.from(meses).sort().reverse().forEach(m => fMes.add(new Option(m.split('-').reverse().join('/'), m)));
            }
            atualizarDashboard();
        } catch (e) { console.error("Erro ao sincronizar dados", e); }
    }

    function parseCSVLine(t) {
        const res = []; let c = '', q = false;
        for (let char of t) { if (char === '"') q = !q; else if (char === ',' && !q) { res.push(c); c = ''; } else c += char; }
        res.push(c); return res;
    }

    function atualizarDashboard() {
        const mSel = document.getElementById('f-mes').value;
        const tSel = document.getElementById('f-tipo').value;

        // --- LÓGICA ANTI-DUPLICIDADE ---
        // Identifica se um lançamento é pagamento de fatura
        const ehPagamentoFatura = (d) => {
            const termo = d.desc.toUpperCase() + d.cat.toUpperCase();
            return termo.includes("FATURA") || 
                   termo.includes("PAGAMENTO CARTÃO") || 
                   termo.includes("PAGAMENTO CARTAO") ||
                   termo.includes("LATAM PASS") || 
                   termo.includes("ITAU PLATINU");
        };

        // 1. SALDO EM CONTA (Dinheiro Real no Banco)
        const saldoBanco = dadosGlobais.filter(d => d.tipoOrigem.includes('extrato'))
                                       .reduce((s, d) => s + d.valor, 0);

        // 2. DÍVIDA ATUAL DO CARTÃO
        // Compras no cartão (valor negativo) são abatidas pelos pagamentos de fatura
        const dividaCartao = dadosGlobais.reduce((s, d) => {
            if (d.tipoOrigem.includes('cartao')) return s + d.valor; 
            if (ehPagamentoFatura(d) && d.valor < 0) return s + Math.abs(d.valor);
            return s;
        }, 0);

        // 3. FILTROS PARA O MÊS SELECIONADO
        const filtrados = dadosGlobais.filter(d => {
            const bateMes = mSel === 'todos' || d.data.startsWith(mSel);
            const bateTipo = tSel === 'todos' || d.tipoOrigem.includes(tSel);
            return bateMes && bateTipo;
        });

        // 4. CÁLCULO DE RECEITA E DESPESA REAL DO MÊS
        const receitasMes = filtrados.filter(d => d.valor > 0).reduce((s, d) => s + d.valor, 0);
        
        // AQUI ESTÁ O TRUQUE: Ignoramos os pagamentos de fatura para não contar 2x
        const despesasMes = filtrados.filter(d => {
            return d.valor < 0 && !ehPagamentoFatura(d);
        }).reduce((s, d) => s + Math.abs(d.valor), 0);

        // Atualização da Interface
        document.getElementById('val-banco').innerText = formatMoeda(saldoBanco);
        document.getElementById('val-fatura').innerText = formatMoeda(dividaCartao);
        document.getElementById('val-rec').innerText = formatMoeda(receitasMes);
        document.getElementById('val-des').innerText = formatMoeda(despesasMes);
        
        // Projeção baseada na despesa real
        document.getElementById('val-proj').innerText = formatMoeda(despesasMes * 1.1);

        // Cores de Alerta
        document.getElementById('val-banco').style.color = saldoBanco < 0 ? 'var(--red)' : 'var(--green)';
        document.getElementById('val-fatura').style.color = dividaCartao < 0 ? 'var(--red)' : 'var(--green)';

        renderRanking(filtrados, ehPagamentoFatura);
        renderCharts(filtrados, ehPagamentoFatura);
    }

    function renderRanking(dados, filtroFatura) {
        // Mostra os 5 maiores gastos reais (comida, mercado, etc), ignorando a fatura
        const gastos = dados.filter(d => d.valor < 0 && !filtroFatura(d))
                           .sort((a,b) => a.valor - b.valor).slice(0, 5);
        document.getElementById('ranking-list').innerHTML = gastos.map(g => `
            <div class="rank-item"><span class="rank-name">${g.desc.substring(0,20)}</span><span class="rank-price">${formatMoeda(Math.abs(g.valor))}</span></div>
        `).join('');
    }

    function renderCharts(dados, filtroFatura) {
        // Gráfico de categorias apenas com gastos reais
        const catData = {};
        dados.filter(d => d.valor < 0 && !filtroFatura(d)).forEach(d => {
            catData[d.cat] = (catData[d.cat] || 0) + Math.abs(d.valor);
        });
        createDonut('chart-cat-mes', Object.keys(catData), Object.values(catData));

        // Gráfico de evolução mensal ignorando duplicidades
        const evoRes = {};
        dadosGlobais.forEach(d => {
            const m = d.data.substring(0, 7);
            if(!evoRes[m]) evoRes[m] = {r:0, d:0};
            if(d.valor > 0) evoRes[m].r += d.valor; 
            else if(!filtroFatura(d)) evoRes[m].d += Math.abs(d.valor);
        });
        const labels = Object.keys(evoRes).sort();
        createBar('chart-evo', labels, labels.map(l => evoRes[l].r), labels.map(l => evoRes[l].d));
    }

    function createDonut(id, labels, data) {
        if(charts[id]) charts[id].destroy();
        charts[id] = new Chart(document.getElementById(id), {
            type: 'doughnut',
            data: { labels, datasets: [{ data, backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'] }] },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 } } } }, cutout: '70%' }
        });
    }

    function createBar(id, labels, rec, des) {
        if(charts[id]) charts[id].destroy();
        charts[id] = new Chart(document.getElementById(id), {
            type: 'bar',
            data: { labels, datasets: [{ label: 'Receita', data: rec, backgroundColor: '#10b981' }, { label: 'Despesa Real', data: des, backgroundColor: '#ef4444' }]},
            options: { maintainAspectRatio: false, scales: { y: { grid: { color: '#2d3748' }, ticks: { color: '#94a3b8' } }, x: { ticks: { color: '#94a3b8' } } } }
        });
    }

    function formatMoeda(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
    document.getElementById('f-mes').addEventListener('change', atualizarDashboard);
    document.getElementById('f-tipo').addEventListener('change', atualizarDashboard);
    carregarDados();
</script>
