<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro - Felipe e Manu</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0F172A; color: #F1F5F9; padding: 24px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .update-info { background: #1E293B; padding: 8px 16px; border-radius: 20px; font-size: 12px; color: #94A3B8; }
        .filters { background: #1E293B; padding: 20px; border-radius: 16px; margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-group label { font-size: 11px; color: #94A3B8; text-transform: uppercase; }
        select, input, button { background: #0F172A; border: 1px solid #334155; padding: 10px 16px; border-radius: 12px; color: #F1F5F9; font-size: 14px; cursor: pointer; }
        button { background: #3B82F6; font-weight: bold; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .card { background: #1E293B; padding: 20px; border-radius: 16px; border-left: 4px solid; }
        .card-title { font-size: 12px; color: #94A3B8; }
        .card-value { font-size: 24px; font-weight: bold; margin-top: 8px; }
        .card.positive { border-left-color: #10B981; }
        .card.negative { border-left-color: #EF4444; }
        .card.neutral { border-left-color: #3B82F6; }
        .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 24px; margin-bottom: 24px; }
        .chart-container { background: #1E293B; padding: 20px; border-radius: 16px; min-height: 350px; }
        .table-container { background: #1E293B; border-radius: 16px; overflow: auto; max-height: 450px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #334155; font-size: 14px; }
        th { background: #0F172A; position: sticky; top: 0; color: #94A3B8; }
        .val-pos { color: #10B981; }
        .val-neg { color: #EF4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Controle Financeiro - Felipe e Manu</h1>
            <div class="update-info">📊 <span id="status">Sincronizando...</span></div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>📅 Mês</label>
                <select id="filtro-mes">
                    <option value="todos">Todos os meses</option>
                </select>
            </div>
            <div class="filter-group">
                <label>📂 Categoria</label>
                <select id="filtro-cat">
                    <option value="todas">Todas Categorias</option>
                </select>
            </div>
            <div class="filter-group">
                <label>🔍 Busca</label>
                <input type="text" id="filtro-busca" placeholder="Ex: Mercado...">
            </div>
            <button onclick="carregarDados()">🔄 Atualizar</button>
        </div>

        <div class="cards">
            <div class="card neutral">
                <div class="card-title">💰 SALDO NO FILTRO</div>
                <div class="card-value" id="card-saldo">R$ 0,00</div>
            </div>
            <div class="card positive">
                <div class="card-title">📈 RECEITAS NO FILTRO</div>
                <div class="card-value" id="card-receitas">R$ 0,00</div>
            </div>
            <div class="card negative">
                <div class="card-title">📉 DESPESAS NO FILTRO</div>
                <div class="card-value" id="card-despesas">R$ 0,00</div>
            </div>
        </div>

        <div class="charts">
            <div class="chart-container"><h3>Gastos por Categoria</h3><canvas id="chart-cat"></canvas></div>
            <div class="chart-container"><h3>Evolução Mensal</h3><canvas id="chart-evo"></canvas></div>
        </div>

        <div class="table-container">
            <table>
                <thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Valor</th></tr></thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>

    <script>
        const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQsLc59dPTESRnZSBy17eECrYtZcerEjsL75UTjBIU5ELxtrdzM5bjtdRSqDjPreA/pub?output=csv';
        let dadosGlobais = [];
        let meuChartCat = null;
        let meuChartEvo = null;

        async function carregarDados() {
            try {
                const resp = await fetch(URL_CSV);
                const csv = await resp.text();
                const linhas = csv.split('\n').filter(l => l.trim().length > 0);
                
                dadosGlobais = [];
                const mesesUnicos = new Set();
                const catsUnicas = new Set();

                for (let i = 1; i < linhas.length; i++) {
                    const col = parseCSVLine(linhas[i]);
                    if (col.length < 6) continue;

                    const data = col[1].trim(); // 2026-06-05
                    const desc = col[3].trim();
                    const cat = col[4].trim() || 'Outros';
                    
                    // Limpeza de valor numérico brasileira ("-2,19")
                    let vLimpo = col[5].replace(/"/g, '').replace(/\s/g, '').replace(',', '.');
                    const valor = parseFloat(vLimpo) || 0;

                    if (data.includes('-') && !desc.toUpperCase().includes("SALDO DO DIA")) {
                        dadosGlobais.push({ data, desc, cat, valor });
                        mesesUnicos.add(data.substring(0, 7));
                        catsUnicas.add(cat);
                    }
                }

                popularFiltros(Array.from(mesesUnicos).sort().reverse(), Array.from(catsUnicas).sort());
                aplicarFiltros();
                document.getElementById('status').innerText = `${dadosGlobais.length} registros carregados`;
            } catch (e) {
                document.getElementById('status').innerText = "Erro ao carregar dados";
            }
        }

        function parseCSVLine(text) {
            const res = []; let cur = '', q = false;
            for (let c of text) {
                if (c === '"') q = !q;
                else if (c === ',' && !q) { res.push(cur); cur = ''; }
                else cur += c;
            }
            res.push(cur); return res;
        }

        function popularFiltros(meses, cats) {
            const fMes = document.getElementById('filtro-mes');
            const fCat = document.getElementById('filtro-cat');
            
            // Preserva a opção "Todos"
            if(fMes.options.length <= 1) {
                meses.forEach(m => fMes.add(new Option(m.split('-').reverse().join('/'), m)));
            }
            if(fCat.options.length <= 1) {
                cats.forEach(c => fCat.add(new Option(c, c)));
            }
        }

        function aplicarFiltros() {
            const mSel = document.getElementById('filtro-mes').value;
            const cSel = document.getElementById('filtro-cat').value;
            const bSel = document.getElementById('filtro-busca').value.toLowerCase();

            const filtrados = dadosGlobais.filter(d => {
                const bateMes = mSel === 'todos' || d.data.startsWith(mSel);
                const bateCat = cSel === 'todas' || d.cat === cSel;
                const bateBusca = !bSel || d.desc.toLowerCase().includes(bSel);
                return bateMes && bateCat && bateBusca;
            });

            atualizarDashboard(filtrados);
        }

        function atualizarDashboard(dados) {
            // 1. Cálculos dos Cards (Dinâmicos baseados no filtro)
            const rec = dados.filter(d => d.valor > 0).reduce((s, d) => s + d.valor, 0);
            const des = dados.filter(d => d.valor < 0).reduce((s, d) => s + Math.abs(d.valor), 0);
            const saldo = rec - des;

            document.getElementById('card-receitas').innerText = formatarMoeda(rec);
            document.getElementById('card-despesas').innerText = formatarMoeda(des);
            document.getElementById('card-saldo').innerText = formatarMoeda(saldo);
            document.getElementById('card-saldo').className = 'card-value ' + (saldo >= 0 ? 'val-pos' : 'val-neg');

            // 2. Tabela
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = dados.slice(0, 50).map(d => `
                <tr>
                    <td>${d.data.split('-').reverse().join('/')}</td>
                    <td>${d.desc}</td>
                    <td>${d.cat}</td>
                    <td class="${d.valor >= 0 ? 'val-pos' : 'val-neg'}">${formatarMoeda(d.valor)}</td>
                </tr>
            `).join('');

            // 3. Gráficos
            gerarGraficos(dados);
        }

        function formatarMoeda(v) {
            return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function gerarGraficos(dados) {
            // Categoria (Rosca)
            const resumoCat = {};
            dados.filter(d => d.valor < 0).forEach(d => resumoCat[d.cat] = (resumoCat[d.cat] || 0) + Math.abs(d.valor));
            
            if (meuChartCat) meuChartCat.destroy();
            meuChartCat = new Chart(document.getElementById('chart-cat'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(resumoCat),
                    datasets: [{ data: Object.values(resumoCat), backgroundColor: ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899'] }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { color: '#F1F5F9' } } } }
            });

            // Evolução (Barras) - Sempre mostra todos os meses para comparação
            const resumoMes = {};
            dadosGlobais.forEach(d => {
                const m = d.data.substring(0, 7);
                if (!resumoMes[m]) resumoMes[m] = { r: 0, d: 0 };
                if (d.valor > 0) resumoMes[m].r += d.valor; else resumoMes[m].d += Math.abs(d.valor);
            });

            const labelsEvo = Object.keys(resumoMes).sort();
            if (meuChartEvo) meuChartEvo.destroy();
            meuChartEvo = new Chart(document.getElementById('chart-evo'), {
                type: 'bar',
                data: {
                    labels: labelsEvo,
                    datasets: [
                        { label: 'Receitas', data: labelsEvo.map(l => resumoMes[l].r), backgroundColor: '#10B981' },
                        { label: 'Despesas', data: labelsEvo.map(l => resumoMes[l].d), backgroundColor: '#EF4444' }
                    ]
                },
                options: { scales: { y: { ticks: { color: '#F1F5F9' } }, x: { ticks: { color: '#F1F5F9' } } } }
            });
        }

        // Listeners de filtro
        document.getElementById('filtro-mes').addEventListener('change', aplicarFiltros);
        document.getElementById('filtro-cat').addEventListener('change', aplicarFiltros);
        document.getElementById('filtro-busca').addEventListener('input', aplicarFiltros);

        carregarDados();
    </script>
</body>
</html>
