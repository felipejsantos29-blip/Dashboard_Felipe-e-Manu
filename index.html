<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Finanças</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --blue: #3b82f6;
            --green: #10b981;
            --red: #ef4444;
            --gray: #94a3b8;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border-left: 5px solid var(--blue); }
        .card h3 { margin: 0; font-size: 0.9rem; color: var(--gray); }
        .card .value { font-size: 1.8rem; font-weight: bold; margin-top: 10px; display: block; }

        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-box { background: var(--card-bg); padding: 20px; border-radius: 12px; height: 350px; }

        .table-container { background: var(--card-bg); padding: 20px; border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #334155; color: var(--gray); }
        td { padding: 12px; border-bottom: 1px solid #334155; font-size: 0.9rem; }
        .val-neg { color: var(--red); }
        .val-pos { color: var(--green); }

        select { background: var(--card-bg); color: white; border: 1px solid var(--gray); padding: 8px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Controle Financeiro</h1>
        <div>
            <select id="f-mes"><option value="todos">Todos os Meses</option></select>
        </div>
    </div>

    <div class="grid-cards">
        <div class="card">
            <h3>Saldo em Conta</h3>
            <span id="val-banco" class="value">R$ 0,00</span>
        </div>
        <div class="card" style="border-color: var(--red);">
            <h3>Dívida Cartões</h3>
            <span id="val-fatura" class="value">R$ 0,00</span>
        </div>
        <div class="card" style="border-color: var(--green);">
            <h3>Receitas</h3>
            <span id="val-rec" class="value">R$ 0,00</span>
        </div>
        <div class="card" style="border-color: var(--red);">
            <h3>Despesa Real (Sem Duplicidade)</h3>
            <span id="val-des" class="value">R$ 0,00</span>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-box">
            <canvas id="chart-evo"></canvas>
        </div>
        <div class="chart-box">
            <canvas id="chart-cat"></canvas>
        </div>
    </div>

    <div class="table-container">
        <h3>Histórico de Gastos Geral</h3>
        <table id="tabela-gastos">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Origem</th>
                    <th>Descrição</th>
                    <th>Categoria</th>
                    <th>Valor</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQsLc59dPTESRnZSBy17eECrYtZcerEjsL75UTjBIU5ELxtrdzM5bjtdRSqDjPreA/pub?output=csv';
    let dadosGlobais = [];
    let charts = {};

    async function carregarDados() {
        const resp = await fetch(URL_CSV);
        const csv = await resp.text();
        const linhas = csv.split('\n').filter(l => l.trim() !== "");
        
        dadosGlobais = [];
        const meses = new Set();

        for (let i = 1; i < linhas.length; i++) {
            const col = parseCSVLine(linhas[i]);
            if (col.length < 6) continue;

            const data = col[1]?.trim();
            const tipo = col[2]?.trim().toLowerCase();
            const desc = col[3]?.trim();
            const cat = col[4]?.trim();
            let vLimpo = col[5].replace(/"/g, '').replace(/\s/g, '').replace(',', '.');
            const valor = parseFloat(vLimpo) || 0;

            if (data && data.includes('-')) {
                dadosGlobais.push({ data, tipo, desc, cat, valor });
                meses.add(data.substring(0, 7));
            }
        }

        const fMes = document.getElementById('f-mes');
        Array.from(meses).sort().reverse().forEach(m => fMes.add(new Option(m, m)));
        
        atualizarDashboard();
    }

    function parseCSVLine(t) {
        const res = []; let c = '', q = false;
        for (let char of t) {
            if (char === '"') q = !q;
            else if (char === ',' && !q) { res.push(c); c = ''; }
            else c += char;
        }
        res.push(c); return res;
    }

    function atualizarDashboard() {
        const mSel = document.getElementById('f-mes').value;
        
        // REGRA DE DUPLICIDADE: Identifica pagamentos de fatura no extrato
        const ehPagamentoCartao = (d) => {
            const t = (d.desc + d.cat).toUpperCase();
            return d.tipo.includes('extrato') && (
                t.includes("LATAM") || t.includes("CLICK") || t.includes("FATURA") || t.includes("PAGAMENTO CARTAO")
            );
        };

        const filtrados = dadosGlobais.filter(d => mSel === 'todos' || d.data.startsWith(mSel));

        // Cálculos dos Cards
        const saldoBancario = dadosGlobais.filter(d => d.tipo.includes('extrato')).reduce((s, d) => s + d.valor, 0);
        const dividaCartao = dadosGlobais.filter(d => d.tipo.includes('cartao')).reduce((s, d) => s + d.valor, 0);
        
        const receitas = filtrados.filter(d => d.valor > 0).reduce((s, d) => s + d.valor, 0);
        
        // APLICAÇÃO DA REGRA: Ignora o valor se for pagamento de fatura no extrato
        const despesas = filtrados.filter(d => d.valor < 0 && !ehPagamentoCartao(d))
                                  .reduce((s, d) => s + Math.abs(d.valor), 0);

        document.getElementById('val-banco').innerText = formatMoeda(saldoBancario);
        document.getElementById('val-fatura').innerText = formatMoeda(dividaCartao);
        document.getElementById('val-rec').innerText = formatMoeda(receitas);
        document.getElementById('val-des').innerText = formatMoeda(despesas);

        renderTabela(filtrados);
        renderCharts(filtrados, ehPagamentoCartao);
    }

    function renderTabela(dados) {
        const tbody = document.querySelector('#tabela-gastos tbody');
        tbody.innerHTML = dados.map(d => `
            <tr>
                <td>${d.data.split('-').reverse().join('/')}</td>
                <td>${d.tipo}</td>
                <td>${d.desc}</td>
                <td>${d.cat}</td>
                <td class="${d.valor >= 0 ? 'val-pos' : 'val-neg'}">${formatMoeda(d.valor)}</td>
            </tr>
        `).join('');
    }

    function renderCharts(dados, filtro) {
        // Gráfico de Categorias (apenas gastos reais)
        const cats = {};
        dados.filter(d => d.valor < 0 && !filtro(d)).forEach(d => {
            cats[d.cat] = (cats[d.cat] || 0) + Math.abs(d.valor);
        });

        if(charts.cat) charts.cat.destroy();
        charts.cat = new Chart(document.getElementById('chart-cat'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(cats),
                datasets: [{ data: Object.values(cats), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'] }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
        });

        // Gráfico de Evolução
        const evo = {};
        dadosGlobais.forEach(d => {
            const m = d.data.substring(0, 7);
            if (!evo[m]) evo[m] = { r: 0, d: 0 };
            if (d.valor > 0) evo[m].r += d.valor;
            else if (!filtro(d)) evo[m].d += Math.abs(d.valor);
        });

        const labels = Object.keys(evo).sort();
        if(charts.evo) charts.evo.destroy();
        charts.evo = new Chart(document.getElementById('chart-evo'), {
            type: 'bar',
            data: {
                labels,
                datasets: [
                    { label: 'Receita', data: labels.map(l => evo[l].r), backgroundColor: '#10b981' },
                    { label: 'Despesa Real', data: labels.map(l => evo[l].d), backgroundColor: '#ef4444' }
                ]
            },
            options: { maintainAspectRatio: false, scales: { y: { ticks: { color: '#94a3b8' } } } }
        });
    }

    function formatMoeda(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
    document.getElementById('f-mes').addEventListener('change', atualizarDashboard);
    carregarDados();
</script>

</body>
</html>
